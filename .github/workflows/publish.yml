name: Publish to PyPI

# Tokenless publishing via PyPI Trusted Publishing (OIDC) — no API token is
# stored anywhere. Fires when a GitHub Release is published (or manually).
#
# One-time PyPI setup (Topher, only you can): pypi.org -> your account ->
# "Publishing" -> "Add a pending publisher":
#     PyPI Project Name: nerlo
#     Owner:             nerlo-ai
#     Repository name:   nerlo-cli
#     Workflow name:     publish.yml
#     Environment name:  pypi
# Creating that pending publisher reserves the `nerlo` name for this repo; the
# first successful run below creates + claims the project.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
